    h2 { color: #2c3e50; margin-bottom: 10px; }
    .status-box { background-color: #eef2f7; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 15px; }
    .btn { background-color: #00b900; color: white; border: none; padding: 16px 32px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; text-decoration: none; display: none; width: 100%; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,185,0,0.2); }
    .btn:hover { background-color: #009f00; }
  </style>
</head>
<body>

<div class="container">
  <h2>工作室打卡系統</h2>
  <p style="color: #666; font-size: 14px;">打卡前請確保手機已開啟 GPS 定位</p>
  
  <div id="status" class="status-box">正在取得 GPS 安全定位中...</div>
  
  <button id="punchBtn" class="btn" onclick="goToForm()">前往填寫上下班單</button>
</div>

<script>
  var userLat = "";
  var userLng = "";

  window.onload = function() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(success, error, {
        enableHighAccuracy: true,
        timeout: 8000
      });
    } else {
      document.getElementById('status').innerHTML = "❌ 您的瀏覽器不支援定位功能。";
    }
  };

  function success(position) {
    userLat = position.coords.latitude;
    userLng = position.coords.longitude;
    document.getElementById('status').innerHTML = "✅ 定位成功！請點擊下方按鈕完成打卡。";
    document.getElementById('punchBtn').style.display = "block"; // 顯示按鈕
  }

  function error(err) {
    document.getElementById('status').innerHTML = "❌ 無法取得定位。請確認手機已開啟 GPS，並在瀏覽器跳出提示時點選「允許定位」，接著重新整理此網頁。";
  }
